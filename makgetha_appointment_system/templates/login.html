<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Makgetha Attorneys · Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-navy: #0a1929;
            --primary-navy-light: #1e3a5f;
            --secondary-gold: #c6a45c;
            --secondary-gold-light: #d8b87c;
            --secondary-gold-dark: #a88644;
            --neutral-50: #fafbfc;
            --neutral-100: #f3f6f9;
            --neutral-200: #e5eaf0;
            --neutral-300: #d1d9e6;
            --neutral-400: #9aa9bc;
            --neutral-500: #66758a;
            --neutral-600: #4a5568;
            --neutral-700: #334155;
            --neutral-800: #1e293b;
            --success: #0f7b5a;
            --success-bg: #e6f7f0;
            --danger: #b91c1c;
            --danger-bg: #fee9e9;
            --info: #0369a1;
            --info-bg: #e0f2fe;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #0f2b42 0%, #051a2c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Decorative elements */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary-gold) 0%, var(--secondary-gold-light) 50%, var(--secondary-gold) 100%);
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M30 0 L60 30 L30 60 L0 30 Z" fill="rgba(198,164,92,0.03)"/></svg>');
            opacity: 0.4;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2.5rem 2.5rem;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(198, 164, 92, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .firm-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .firm-logo h1 {
            font-family: 'Georgia', 'Times New Roman', 'Times', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary-navy);
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }

        .firm-logo span {
            font-size: 0.8rem;
            color: var(--secondary-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            color: var(--primary-navy);
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .login-header p {
            color: var(--neutral-500);
            font-size: 0.9rem;
        }

        /* Alert styles */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            border: 1px solid transparent;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success);
            border-color: rgba(15, 123, 90, 0.2);
        }

        .alert-error {
            background: var(--danger-bg);
            color: var(--danger);
            border-color: rgba(185, 28, 28, 0.2);
        }

        .alert-info {
            background: var(--info-bg);
            color: var(--info);
            border-color: rgba(3, 105, 161, 0.2);
        }

        .alert i {
            font-size: 1.2rem;
        }

        /* Form styles */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--neutral-700);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--neutral-400);
            font-size: 1rem;
            transition: color 0.2s;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 2px solid var(--neutral-200);
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background: var(--neutral-50);
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--secondary-gold);
            background: white;
            box-shadow: 0 0 0 4px rgba(198, 164, 92, 0.15);
        }

        .form-control:focus + .input-icon {
            color: var(--secondary-gold);
        }

        .form-control::placeholder {
            color: var(--neutral-400);
            font-size: 0.9rem;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: var(--neutral-400);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .password-toggle:hover {
            color: var(--secondary-gold);
        }

        /* Form options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--neutral-600);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--secondary-gold);
            border-radius: 4px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--secondary-gold);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
        }

        .forgot-password::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--secondary-gold);
            transition: width 0.2s;
        }

        .forgot-password:hover::after {
            width: 100%;
        }

        /* Login button */
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-navy) 0%, var(--primary-navy-light) 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(10, 25, 41, 0.3);
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(10, 25, 41, 0.4);
            background: linear-gradient(135deg, var(--primary-navy-light) 0%, var(--primary-navy) 100%);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login i {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-login:hover i {
            transform: translateX(3px);
        }

        /* Register link */
        .register-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--neutral-500);
            font-size: 0.9rem;
            border-top: 1px solid var(--neutral-200);
            padding-top: 1.5rem;
        }

        .register-link a {
            color: var(--secondary-gold);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.25rem;
            position: relative;
        }

        .register-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--secondary-gold);
            transition: width 0.2s;
        }

        .register-link a:hover::after {
            width: 100%;
        }

        /* Login footer */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .login-footer a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.2s;
        }

        .login-footer a:hover {
            color: var(--secondary-gold);
        }

        /* Loading state */
        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-login.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 24px;
            }

            .firm-logo h1 {
                font-size: 1.5rem;
            }

            .login-header h2 {
                font-size: 1.3rem;
            }

            .form-options {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }

        /* Auto-fill styles */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px var(--neutral-50) inset !important;
            -webkit-text-fill-color: var(--neutral-800) !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="firm-logo">
                <h1>M. Makgetha Attorneys</h1>
                <span>Counsel Management System</span>
            </div>

            <!-- Header -->
            <div class="login-header">
                <h2>Welcome Back</h2>
            </div>

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="{% url 'login' %}" id="loginForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" 
                               class="form-control" 
                               id="username" 
                               name="username" 
                               placeholder="Enter your username" 
                               required 
                               autofocus
                               autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               placeholder="Enter your password" 
                               required
                               autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember_me">
                        <span>Keep me signed in</span>
                    </label>
                    
                </div>

                <button type="submit" class="btn-login" id="loginButton">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In to Dashboard
                </button>

                <div class="register-link">
                    <i class="fas fa-shield-alt" style="color: var(--secondary-gold); margin-right: 4px;"></i>
                    Secure enterprise login
                    <br>
                </div>
            </form>
        </div>
        
        <!-- Footer -->
        <div class="login-footer">
            <p>&copy; {% now "Y" %} M. Makgetha Attorneys. All rights reserved.</p>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Auto-hide alerts after 5 seconds
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.transition = 'opacity 0.5s, transform 0.5s';
                alert.style.opacity = '0';
                alert.style.transform = 'translateX(-10px)';
                setTimeout(() => alert.remove(), 500);
            });
        }, 5000);

    

        // Add loading state on form submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const loginButton = document.getElementById('loginButton');
            const originalText = loginButton.innerHTML;
            
            // Add loading state
            loginButton.classList.add('loading');
            loginButton.innerHTML = '<i class="fas fa-circle-notch"></i> Signing in...';
            
            // Remove loading state after 3 seconds (in case of error)
            setTimeout(() => {
                if (loginButton.classList.contains('loading')) {
                    loginButton.classList.remove('loading');
                    loginButton.innerHTML = originalText;
                }
            }, 3000);
        });

        // Add keyboard shortcut (Ctrl+Shift+D) for demo credentials
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                e.preventDefault();
                showDemoCredentials(e);
            }
        });

        // Focus trap for modal (accessibility)
        const focusableElements = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';
        const firstFocusable = document.querySelector('.login-card ' + focusableElements);
        
        // Focus first input on load
        window.addEventListener('load', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
