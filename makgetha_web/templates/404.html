<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | M. Makgetha Attorneys Inc.</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #111210; --gold: #b8965a; --warm-white: #f5f2ec; --stone: #4a4b48; --charcoal: #1c1d1b;
            --navy: #0d2137;
            --navy-mid: #163352;
            --navy-deep: #08131f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--navy); color: var(--warm-white); font-family: 'Jost', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
        .wrap { max-width: 520px; }
        .four-o-four { font-family: 'Playfair Display', serif; font-size: clamp(6rem, 20vw, 10rem); font-weight: 400; color: rgba(184,150,90,0.15); line-height: 1; margin-bottom: -20px; }
        .line { width: 48px; height: 2px; background: var(--gold); margin: 0 auto 32px; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 600; color: var(--warm-white); margin-bottom: 16px; }
        p { font-size: 1rem; color: rgba(217,209,196,0.55); line-height: 1.7; margin-bottom: 40px; font-weight: 300; }
        a { display: inline-block; font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; padding: 15px 36px; background: var(--gold); color: var(--ink); text-decoration: none; transition: background 0.25s; }
        a:hover { background: #cead78; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="four-o-four">404</div>
        <div class="line"></div>
        <h1>Page Not Found</h1>
        <p>The page you are looking for doesn't exist or may have been moved. Please return to our homepage.</p>
        <a href="/">Return to Homepage</a>
    </div>
</body>
</html>
